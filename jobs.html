<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacancies | Enoch Mgijima Smart Recruitment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-800">
    <header class="border-b bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
        <a href="index.html" class="text-sm font-semibold text-blue-700">← Home</a>
        <h1 class="text-lg font-bold">Workday-Style Vacancy Portal</h1>
        <a href="apply.html" class="rounded-lg bg-blue-700 px-3 py-2 text-sm font-semibold text-white">Quick Apply</a>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8">
      <section class="rounded-2xl border bg-white p-5 shadow-sm">
        <div class="grid gap-3 md:grid-cols-4">
          <input id="keywordFilter" class="rounded-xl border px-3 py-2.5 md:col-span-2" placeholder="Search by title, ID, department..." />
          <select id="departmentFilter" class="rounded-xl border px-3 py-2.5"><option value="all">All Departments</option></select>
          <select id="locationFilter" class="rounded-xl border px-3 py-2.5"><option value="all">All Locations</option></select>
        </div>
        <div class="mt-3 flex items-center justify-between">
          <p class="text-sm text-slate-500"><span id="resultCount" class="font-semibold text-slate-700">0</span> vacancies found</p>
          <button id="loadMoreBtn" class="rounded-lg border px-3 py-2 text-sm font-medium">Load more</button>
        </div>
      </section>

      <section id="jobsGrid" class="mt-6 grid gap-4"></section>
    </main>

    <script src="js/jobs-data.js"></script>
    <script>
      const jobs = window.JOBS_DATA || [];
      const keywordFilter = document.getElementById('keywordFilter');
      const departmentFilter = document.getElementById('departmentFilter');
      const locationFilter = document.getElementById('locationFilter');
      const jobsGrid = document.getElementById('jobsGrid');
      const resultCount = document.getElementById('resultCount');
      const loadMoreBtn = document.getElementById('loadMoreBtn');

      let limit = 4;

      function setupFilters() {
        [...new Set(jobs.map(j => j.department))].forEach(dep => {
          const option = document.createElement('option');
          option.value = dep;
          option.textContent = dep;
          departmentFilter.appendChild(option);
        });
        [...new Set(jobs.map(j => j.location))].forEach(loc => {
          const option = document.createElement('option');
          option.value = loc;
          option.textContent = loc;
          locationFilter.appendChild(option);
        });
      }

      function filteredJobs() {
        const keyword = keywordFilter.value.trim().toLowerCase();
        const dep = departmentFilter.value;
        const loc = locationFilter.value;

        return jobs.filter(job => {
          const searchText = `${job.id} ${job.title} ${job.department} ${job.location}`.toLowerCase();
          const matchKeyword = !keyword || searchText.includes(keyword);
          const matchDep = dep === 'all' || job.department === dep;
          const matchLoc = loc === 'all' || job.location === loc;
          return matchKeyword && matchDep && matchLoc;
        });
      }

      function render() {
        const rows = filteredJobs();
        resultCount.textContent = rows.length;
        jobsGrid.innerHTML = '';

        rows.slice(0, limit).forEach(job => {
          const el = document.createElement('article');
          el.className = 'rounded-2xl border bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow';
          el.innerHTML = `
            <div class="flex flex-wrap items-start justify-between gap-3">
              <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-blue-700">${job.id}</p>
                <h3 class="mt-1 text-xl font-bold text-slate-900">${job.title}</h3>
                <p class="mt-1 text-sm text-slate-500">${job.department} · ${job.location} · ${job.jobType}</p>
              </div>
              <span class="rounded-full bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700">Closing ${job.closingDate}</span>
            </div>
            <p class="mt-3 text-sm text-slate-600">${job.description}</p>
            <div class="mt-4 flex gap-2">
              <a href="job-details.html?id=${encodeURIComponent(job.id)}" class="rounded-lg border px-3 py-2 text-sm font-semibold">View Details</a>
              <a href="apply.html?id=${encodeURIComponent(job.id)}" class="rounded-lg bg-blue-700 px-3 py-2 text-sm font-semibold text-white">Apply</a>
            </div>`;
          jobsGrid.appendChild(el);
        });

        loadMoreBtn.style.display = rows.length > limit ? 'inline-block' : 'none';
      }

      [keywordFilter, departmentFilter, locationFilter].forEach(el => {
        el.addEventListener('input', () => { limit = 4; render(); });
        el.addEventListener('change', () => { limit = 4; render(); });
      });

      loadMoreBtn.addEventListener('click', () => { limit += 4; render(); });

      setupFilters();
      render();
    </script>
  </body>
</html>
